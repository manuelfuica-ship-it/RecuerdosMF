<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Contraseñas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3b82f6;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .header-actions .btn {
            padding: 8px 12px;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .header-actions {
                width: 100%;
                justify-content: space-between;
            }

            .header-actions .btn {
                padding: 6px 10px;
                font-size: 12px;
                flex: 1;
                min-width: 70px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px;
            }

            .header h1 {
                font-size: 18px;
            }

            .header-actions {
                width: 100%;
                flex-direction: column;
                gap: 8px;
            }

            .header-actions .btn {
                padding: 12px 10px;
                font-size: 14px;
                min-width: auto;
                width: 100%;
            }

            .app-toolbar {
                flex-direction: column;
                gap: 8px;
            }

            .app-toolbar .btn {
                padding: 14px;
                font-size: 14px;
                width: 100%;
                min-height: 44px;
            }

            .btn {
                min-height: 44px;
                padding: 12px 16px;
                font-size: 14px;
            }
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: #0f172a;
        }

        .btn-primary:hover {
            background: #f0f8ff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .btn-success {
            background: #2ed573;
            color: white;
        }

        .btn-success:hover {
            background: #26de81;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .passwords-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .password-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .password-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .password-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .password-card-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .password-card-actions {
            display: flex;
            gap: 8px;
        }

        .password-card-actions button {
            padding: 6px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #e0e0e0;
            color: #333;
            transition: all 0.2s ease;
        }

        .password-card-actions button:hover {
            background: #3b82f6;
            color: white;
        }

        .password-field {
            margin-bottom: 12px;
        }

        .password-field-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .password-field-value {
            font-family: 'Monaco', 'Menlo', monospace;
            word-break: break-all;
            color: #333;
            background: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .password-hidden {
            letter-spacing: 3px;
        }

        .toggle-password {
            background: none;
            border: none;
            cursor: pointer;
            color: #3b82f6;
            font-size: 12px;
            font-weight: 600;
            padding: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-content form {
            overflow-y: auto;
            padding: 30px;
            padding-bottom: 20px;
        }

        .modal-header {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            padding: 30px 30px 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            padding: 20px 30px;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .modal-footer button:last-child {
            margin-left: auto;
        }

        .modal-footer .btn-secondary {
            background: #e0e0e0;
            color: #333;
            border: 1px solid #ccc;
        }

        .modal-footer .btn-secondary:hover {
            background: #d0d0d0;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #666;
        }

        .app-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .app-toolbar .btn {
            padding: 10px 16px;
            font-size: 14px;
            background: #e0e0e0 !important;
            color: #333 !important;
            border: 1px solid #ccc !important;
        }

        .app-toolbar .btn:hover {
            background: #d0d0d0 !important;
        }

        @media (max-width: 768px) {
            .app-toolbar {
                gap: 8px;
            }

            .app-toolbar .btn {
                padding: 8px 12px;
                font-size: 12px;
                flex: 1;
                min-width: 80px;
            }
        }

        @media (max-width: 480px) {
            .app-toolbar {
                gap: 6px;
            }

            .app-toolbar .btn {
                padding: 6px 10px;
                font-size: 11px;
                min-width: 70px;
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #1e40af 0%, #0f172a 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #3b82f6;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .header {
                border-radius: 0;
            }

            .passwords-list {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .modal-content {
                margin: 20px;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Gestor de Contraseñas</h1>
            <div class="header-actions">
            </div>
        </div>

        <div class="main-content">
            <div id="loginView" class="login-form">
                <div id="loginMessage" style="margin-bottom: 20px;"></div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="su@email.com" autocomplete="email" autofocus>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <input type="password" id="loginPassword" placeholder="Ingrese su contraseña" autocomplete="current-password" style="flex: 1;">
                        <button type="button" class="toggle-password" onclick="toggleLoginPasswordVisibility()" style="padding: 8px 12px; background: #3b82f6; color: white; border-radius: 4px; cursor: pointer; font-size: 13px; border: none;">Ver</button>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="authenticate()" style="width: 100%; padding: 14px; font-size: 16px;">Acceder</button>
            </div>

            <div id="appView" class="hidden">
                <div id="message"></div>

                <div class="app-toolbar">
                    <button class="btn btn-secondary" onclick="syncToSupabase()" style="background: #3b82f6 !important; color: white !important;">Supabase</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">Importar</button>
                    <input type="file" id="importFile" hidden accept=".json" onchange="importData(event)">
                    <button class="btn btn-secondary" onclick="exportData()">Exportar</button>
                    <button class="btn btn-secondary" onclick="logout()" style="margin-left: auto;">Salir</button>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Contraseñas guardadas</div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <input type="text" id="searchInput" placeholder="Buscar contraseña..." class="search-box" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; min-width: 200px;">
                    <button class="btn btn-secondary" onclick="showDuplicates()" style="background: #ff9800; color: white;">🔍 Ver Duplicados</button>
                    <button class="btn btn-secondary" onclick="cleanAllDuplicates()" style="background: #f44336; color: white;">🗑️ Limpiar</button>
                    <button class="btn btn-success" onclick="openAddModal()">+ Agregar</button>
                </div>

                <div id="passwordsContainer"></div>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Agregar Contraseña</div>
            <form id="addForm" onsubmit="savePassword(event)">
                <div class="form-group">
                    <label>Nombre de la aplicación</label>
                    <input type="text" id="addName" required>
                </div>
                <div class="form-group">
                    <label>Usuario/Email</label>
                    <input type="text" id="addUsername" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="addPassword" required>
                </div>
                <div class="form-group">
                    <label>URL (opcional)</label>
                    <input type="text" id="addUrl" placeholder="https://ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Notas (opcional)</label>
                    <textarea id="addNotes" rows="3"></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">Cancelar</button>
                <button type="submit" form="addForm" class="btn btn-success">Guardar</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Editar Contraseña</div>
            <form id="editForm" onsubmit="updatePassword(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Nombre de la aplicación</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>Usuario/Email</label>
                    <input type="text" id="editUsername" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="editPassword" required>
                </div>
                <div class="form-group">
                    <label>URL (opcional)</label>
                    <input type="url" id="editUrl">
                </div>
                <div class="form-group">
                    <label>Notas (opcional)</label>
                    <textarea id="editNotes" rows="3"></textarea>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('editModal')">Cancelar</button>
                <button type="submit" form="editForm" class="btn btn-success">Actualizar</button>
            </div>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Google Drive API Key
        const GOOGLE_DRIVE_API_KEY = 'AIzaSyDsAwNMHkzp1S4ftN5IRGv7QxZ6p9OaZBE';

        // Supabase Client
        const SUPABASE_URL = 'https://gzcrgmvvlqnreijcxsdc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8zQsKMpG-Ret5-y5jC7P9w_Bk0oazZg';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Configuración de seguridad
        const CONFIG = {
            algorithm: 'AES-GCM',
            keySize: 256,
            tagLength: 128,
            iterations: 100000,
            saltLength: 16,
            ivLength: 12
        };

        // Estado global
        let state = {
            passwords: [],
            masterPassword: null,
            encryptionKey: null,
            isAuthenticated: false,
            salt: null,
            lastSync: null
        };

        // Inicializar app
        async function init() {
            try {
                await loadData();
                updateStats();
                attachEventListeners();
            } catch (error) {
                console.error('Error al inicializar:', error);
            }
        }

        // Derivar clave de contraseña maestra
        async function deriveKey(password, salt) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);

            const baseKey = await crypto.subtle.importKey(
                'raw',
                data,
                'PBKDF2',
                false,
                ['deriveBits']
            );

            const bits = await crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: CONFIG.iterations,
                    hash: 'SHA-256'
                },
                baseKey,
                CONFIG.keySize
            );

            return crypto.subtle.importKey(
                'raw',
                bits,
                CONFIG.algorithm,
                false,
                ['encrypt', 'decrypt']
            );
        }

        // Generar salt aleatorio
        function generateSalt() {
            return crypto.getRandomValues(new Uint8Array(CONFIG.saltLength));
        }

        // Generar IV aleatorio
        function generateIV() {
            return crypto.getRandomValues(new Uint8Array(CONFIG.ivLength));
        }

        // Convertir array a hex
        function arrayToHex(array) {
            return Array.from(array).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Convertir hex a array
        function hexToArray(hex) {
            const array = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) {
                array[i / 2] = parseInt(hex.substr(i, 2), 16);
            }
            return array;
        }

        // Encriptar datos
        async function encrypt(data, key) {
            const encoder = new TextEncoder();
            const iv = generateIV();

            // Si es un string, encriptar directamente. Si es un objeto, convertir a JSON
            const toEncrypt = typeof data === 'string' ? data : JSON.stringify(data);
            const encoded = encoder.encode(toEncrypt);

            const encrypted = await crypto.subtle.encrypt(
                { name: CONFIG.algorithm, iv: iv, tagLength: CONFIG.tagLength },
                key,
                encoded
            );

            return {
                iv: arrayToHex(iv),
                data: arrayToHex(new Uint8Array(encrypted))
            };
        }

        // Desencriptar datos
        async function decrypt(encrypted, key) {
            try {
                const decoder = new TextDecoder();
                const iv = hexToArray(encrypted.iv);
                const data = hexToArray(encrypted.data);

                const decrypted = await crypto.subtle.decrypt(
                    { name: CONFIG.algorithm, iv: iv, tagLength: CONFIG.tagLength },
                    key,
                    data
                );

                const decryptedText = decoder.decode(decrypted);

                // Intentar parsear como JSON. Si falla, es un string simple
                try {
                    return JSON.parse(decryptedText);
                } catch {
                    return decryptedText;
                }
            } catch (error) {
                // No lanzar error, devolver null para que el código que llama lo maneje silenciosamente
                return null;
            }
        }

        // Autenticar con Supabase
        async function authenticate() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('Ingrese email y contraseña', 'error');
                return;
            }

            try {
                showMessage('Autenticando...', 'info');

                // Autenticar con Supabase
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    throw new Error(error.message || 'Email o contraseña incorrectos');
                }

                // Guardar info de autenticación
                state.userEmail = email;
                state.userId = data.user.id;
                localStorage.setItem('supabaseEmail', email);

                // Derivar clave de encriptación de la contraseña
                state.salt = generateSalt();
                state.masterPassword = password;
                state.encryptionKey = await deriveKey(password, state.salt);

                // Cargar contraseñas desde Supabase
                const { data: passwords, error: pwdError } = await supabaseClient
                    .from('passwords')
                    .select('*')
                    .eq('user_id', state.userId);

                if (pwdError) {
                    console.error('Error cargando contraseñas:', pwdError);
                    state.passwords = [];
                } else {
                    // Convertir datos de Supabase al formato local y desencriptar
                    state.passwords = await Promise.all(passwords.map(async (pwd) => {
                        let decryptedPassword = pwd.contraseña_encriptada;

                        // Desencriptar si existe IV (contraseña encriptada)
                        if (pwd.contraseña_iv && pwd.contraseña_encriptada) {
                            try {
                                decryptedPassword = await decrypt({
                                    iv: pwd.contraseña_iv,
                                    data: pwd.contraseña_encriptada
                                }, state.encryptionKey);
                            } catch (error) {
                                // Silenciado: console.error('Error desencriptando contraseña:', error);
                                decryptedPassword = '(No se pudo desencriptar)';
                            }
                        }

                        return {
                            id: pwd.id,
                            nombre: pwd.nombre,
                            usuario: pwd.usuario,
                            contraseña: decryptedPassword,
                            url: pwd.url || '',
                            notas: pwd.notas || '',
                            fechaCreacion: pwd.created_at
                        };
                    }));
                }

                // Asegurar que passwords sea un array
                if (!Array.isArray(state.passwords)) {
                    state.passwords = [];
                }

                state.isAuthenticated = true;
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('message').textContent = '';
                document.getElementById('message').className = '';

                // Configurar sincronización en tiempo real
                setupRealtimeSync();

                // Verificar si hay datos antiguos para migrar
                await migrateOldDataToSupabase();

                renderPasswords();
                updateStats();
                showMessage('✅ Autenticado correctamente', 'success');

            } catch (error) {
                console.error('Error en authenticate:', error);
                showMessage(error.message || 'Error al autenticar', 'error');
                state.isAuthenticated = false;
            }
        }

        // Migrar datos antiguos de localStorage a Supabase
        async function migrateOldDataToSupabase() {
            try {
                // Verificar si ya se hizo la migración
                const migrationDone = localStorage.getItem('passwordsMigrationDone');
                if (migrationDone === 'true') return; // Ya fue migrado

                // Verificar si hay datos antiguos en localStorage
                const localData = localStorage.getItem('passwordManagerData');
                if (!localData) return; // No hay datos antiguos

                const data = JSON.parse(localData);

                // Verificar que tenga estructura antigua (encryptedData con todos los datos juntos)
                if (!data.encryptedData || !data.encryptedData.iv || !data.encryptedData.data) {
                    return; // Formato no válido
                }

                // Desencriptar datos antiguos
                let oldPasswords = [];
                try {
                    // El archivo antiguo tiene su propio salt, necesitamos usar ese
                    // Para desencriptar correctamente
                    let oldSalt = state.salt;
                    if (data.salt && data.salt.length > 0) {
                        oldSalt = hexToArray(data.salt);
                    }

                    // Derivar clave con el salt del archivo antiguo
                    const oldKey = await deriveKey(state.masterPassword, oldSalt);

                    // Desencriptar usando la clave derivada del salt antiguo
                    oldPasswords = await decrypt(data.encryptedData, oldKey);
                    if (!Array.isArray(oldPasswords)) {
                        oldPasswords = [];
                    }
                } catch (error) {
                    console.error('No se pudo desencriptar datos antiguos:', error);
                    return;
                }

                // Si no hay contraseñas antiguas, no hay nada que migrar
                if (oldPasswords.length === 0) {
                    return;
                }

                console.log(`Migrando ${oldPasswords.length} contraseñas antiguas a Supabase...`);

                // Insertar cada contraseña en Supabase con nuevo formato
                let migradas = 0;
                let fallidas = 0;

                for (const pwd of oldPasswords) {
                    try {
                        // Validar y convertir campos a strings de forma muy defensiva
                        let nombre, usuario, contraseña, url, notas;

                        try {
                            nombre = String(pwd.nombre || '').trim();
                            if (!nombre || nombre === 'undefined' || nombre === 'null') {
                                throw new Error('Nombre inválido');
                            }
                        } catch (e) {
                            console.warn('Nombre inválido:', pwd.nombre);
                            fallidas++;
                            continue;
                        }

                        try {
                            usuario = String(pwd.usuario || '').trim();
                            if (!usuario || usuario === 'undefined' || usuario === 'null') {
                                throw new Error('Usuario inválido');
                            }
                        } catch (e) {
                            console.warn('Usuario inválido:', pwd.usuario);
                            fallidas++;
                            continue;
                        }

                        try {
                            contraseña = String(pwd.contraseña || '').trim();
                            if (!contraseña || contraseña === 'undefined' || contraseña === 'null') {
                                throw new Error('Contraseña inválida');
                            }
                        } catch (e) {
                            console.warn('Contraseña inválida:', pwd.contraseña);
                            fallidas++;
                            continue;
                        }

                        url = pwd.url && String(pwd.url).trim() ? String(pwd.url).trim() : null;
                        notas = pwd.notas && String(pwd.notas).trim() ? String(pwd.notas).trim() : null;

                        // Validar que campos tengan contenido válido
                        if (!nombre.match(/^.+$/) || !usuario.match(/^.+$/)) {
                            console.warn('Campos insuficientes:', pwd);
                            fallidas++;
                            continue;
                        }

                        // Encriptar cada contraseña individualmente con nuevo formato
                        const encrypted = await encrypt(contraseña, state.encryptionKey);

                        const passwordData = {
                            nombre: nombre,
                            usuario: usuario,
                            contraseña_encriptada: encrypted.data,
                            contraseña_iv: encrypted.iv,
                            url: url,
                            notas: notas,
                            user_id: state.userId,
                            created_at: pwd.fechaCreacion || new Date().toISOString()
                        };

                        // Insertar en Supabase
                        const { error } = await supabaseClient
                            .from('passwords')
                            .insert([passwordData]);

                        if (error) {
                            console.error('Error migrando contraseña:', error);
                            fallidas++;
                        } else {
                            migradas++;
                        }
                    } catch (error) {
                        console.error('Error procesando contraseña para migración:', error);
                        fallidas++;
                    }
                }

                console.log(`Migración completada: ${migradas} exitosas, ${fallidas} fallidas de ${oldPasswords.length}`);

                if (migradas > 0) {
                    showMessage(`✅ Se migraron ${migradas} contraseñas a Supabase`, 'success');
                }
                if (fallidas > 0) {
                    showMessage(`⚠️ ${fallidas} contraseñas no pudieron migrarse (datos incompletos)`, 'error');
                }

                // Limpiar datos antiguos de localStorage después de migrar
                localStorage.removeItem('passwordManagerData');
                // Marcar que la migración se completó (para no repetir)
                localStorage.setItem('passwordsMigrationDone', 'true');
                console.log('Migración completada');

            } catch (error) {
                console.error('Error en migración:', error);
            }
        }

        // Sincronización con polling (cada 2 segundos)
        let pollInterval = null;

        function setupRealtimeSync() {
            if (!state.userId) return;

            // Usar polling en lugar de Realtime para mayor compatibilidad
            if (pollInterval) {
                clearInterval(pollInterval);
            }

            // Actualizar cada 2 segundos para sincronización más rápida
            pollInterval = setInterval(() => {
                if (state.isAuthenticated && state.userId) {
                    loadAndRefresh();
                }
            }, 2000);

            console.log('Polling iniciado (2 segundos)');
        }

        // Recargar y refrescar UI
        async function loadAndRefresh() {
            if (!state.userId || !state.encryptionKey) return;

            const { data: passwords, error } = await supabaseClient
                .from('passwords')
                .select('*')
                .eq('user_id', state.userId);

            if (!error && passwords) {
                state.passwords = await Promise.all(passwords.map(async (pwd) => {
                    let decryptedPassword = pwd.contraseña_encriptada;

                    // Desencriptar si existe IV (contraseña encriptada)
                    if (pwd.contraseña_iv && pwd.contraseña_encriptada) {
                        const result = await decrypt({
                            iv: pwd.contraseña_iv,
                            data: pwd.contraseña_encriptada
                        }, state.encryptionKey);

                        if (result === null) {
                            decryptedPassword = '(No se pudo desencriptar)';
                        } else {
                            decryptedPassword = result;
                        }
                    }

                    return {
                        id: pwd.id,
                        nombre: pwd.nombre,
                        usuario: pwd.usuario,
                        contraseña: decryptedPassword,
                        url: pwd.url || '',
                        notas: pwd.notas || '',
                        fechaCreacion: pwd.created_at
                    };
                }));

                renderPasswords();
                updateStats();
            }
        }

                const data = await response.json();

                if (data.salt && data.salt.length > 0) {
                    state.salt = hexToArray(data.salt);
                    state.encryptedData = data.encryptedData;
                    state.lastSync = data.lastSync || new Date().toISOString();
                } else {
                    // Si data.json está vacío, intentar cargar desde localStorage
                    const localData = localStorage.getItem('passwordManagerData');
                    if (localData) {
                        const parsed = JSON.parse(localData);
                        state.salt = parsed.salt && parsed.salt.length > 0 ? hexToArray(parsed.salt) : null;
                        state.encryptedData = parsed.encryptedData;
                        state.lastSync = parsed.lastSync || new Date().toISOString();
                    } else {
                        state.salt = null;
                        state.passwords = [];
                    }
                }
            } catch (error) {
                // Primera ejecución o archivo no existe
                const localData = localStorage.getItem('passwordManagerData');
                if (localData) {
                    try {
                        const parsed = JSON.parse(localData);
                        state.salt = parsed.salt && parsed.salt.length > 0 ? hexToArray(parsed.salt) : null;
                        state.encryptedData = parsed.encryptedData;
                        state.lastSync = parsed.lastSync || new Date().toISOString();
                    } catch (e) {
                        state.salt = null;
                        state.passwords = [];
                    }
                } else {
                    state.salt = null;
                    state.passwords = [];
                }
            }
        }

        // Encontrar duplicados (mismo nombre + usuario)
        function findDuplicates() {
            const duplicateMap = {};
            const duplicates = [];

            for (const pwd of state.passwords) {
                const key = `${pwd.nombre.toLowerCase().trim()}|${pwd.usuario.toLowerCase().trim()}`;
                if (!duplicateMap[key]) {
                    duplicateMap[key] = [];
                }
                duplicateMap[key].push(pwd);
            }

            // Filtrar solo grupos con más de una contraseña
            for (const key in duplicateMap) {
                if (duplicateMap[key].length > 1) {
                    duplicates.push(...duplicateMap[key]);
                }
            }

            return duplicates;
        }

        // Limpiar todos los duplicados automáticamente
        async function cleanAllDuplicates() {
            const duplicates = findDuplicates();

            if (duplicates.length === 0) {
                showMessage('✅ No hay duplicados para limpiar', 'success');
                return;
            }

            if (!confirm(`Se eliminarán ${duplicates.length} contraseñas duplicadas. ¿Continuar?`)) {
                return;
            }

            showMessage('Limpiando duplicados... esto puede tomar unos segundos', 'info');

            try {
                // Agrupar por nombre+usuario
                const groups = {};
                for (const pwd of state.passwords) {
                    const key = `${pwd.nombre.toLowerCase().trim()}|${pwd.usuario.toLowerCase().trim()}`;
                    if (!groups[key]) {
                        groups[key] = [];
                    }
                    groups[key].push(pwd);
                }

                // Recopilar IDs a eliminar
                const idsToDelete = [];
                for (const key in groups) {
                    if (groups[key].length > 1) {
                        // Ordenar por fecha (más reciente al final)
                        groups[key].sort((a, b) => new Date(a.fechaCreacion) - new Date(b.fechaCreacion));

                        // Marcar todas excepto la última (más reciente) para eliminar
                        for (let i = 0; i < groups[key].length - 1; i++) {
                            idsToDelete.push(groups[key][i].id);
                        }
                    }
                }

                if (idsToDelete.length === 0) {
                    showMessage('✅ No hay duplicados para eliminar', 'success');
                    return;
                }

                // Eliminar en batch (mucho más rápido)
                for (const id of idsToDelete) {
                    await supabaseClient
                        .from('passwords')
                        .delete()
                        .eq('id', id)
                        .eq('user_id', state.userId);
                }

                // Recargar datos una sola vez
                await loadAndRefresh();

                showMessage(`✅ Se eliminaron ${idsToDelete.length} duplicados`, 'success');

            } catch (error) {
                console.error('Error al limpiar duplicados:', error);
                showMessage('Error al limpiar: ' + error.message, 'error');
            }
        }

        async function downloadFromGoogleDrive(fileId, fileName) {
            try {
                showMessage('Descargando desde Google Drive...', 'info');

                const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${GOOGLE_DRIVE_API_KEY}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('No se pudo descargar el archivo');
                }

                const fileContent = await response.text();
                const data = JSON.parse(fileContent);

                if (!data.version || !data.salt || !data.encryptedData) {
                    throw new Error('Archivo de respaldo inválido');
                }

                if (!confirm('¿Está seguro de que desea importar este archivo de Google Drive?')) {
                    showMessage('Importación cancelada', 'error');
                    return;
                }

                state.salt = hexToArray(data.salt);
                state.encryptedData = data.encryptedData;
                state.lastSync = data.lastSync || new Date().toISOString();

                localStorage.setItem('passwordManagerData', JSON.stringify(data));

                showMessage('Datos importados correctamente. Ingrese su contraseña maestra para continuar.', 'success');
                logout();

            } catch (error) {
                showMessage('Error al importar: ' + error.message, 'error');
            }
        }

        // Importar datos
        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                showMessage('Importando...', 'info');

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = JSON.parse(e.target.result);

                        if (!data.version || !data.salt || !data.encryptedData) {
                            throw new Error('Archivo de respaldo inválido');
                        }

                        if (!confirm('¿Está seguro de que desea reemplazar sus datos actuales con los del respaldo importado?')) {
                            showMessage('Importación cancelada', 'error');
                            document.getElementById('importFile').value = '';
                            return;
                        }

                        state.salt = hexToArray(data.salt);
                        state.encryptedData = data.encryptedData;
                        state.lastSync = data.lastSync || new Date().toISOString();

                        // Guardar en localStorage
                        localStorage.setItem('passwordManagerData', JSON.stringify(data));

                        showMessage('Datos importados correctamente. Ingrese su contraseña maestra para continuar.', 'success');
                        logout();

                        document.getElementById('importFile').value = '';
                    } catch (error) {
                        showMessage('Error al procesar archivo: ' + error.message, 'error');
                        document.getElementById('importFile').value = '';
                    }
                };

                reader.readAsText(file);
            } catch (error) {
                showMessage('Error al importar: ' + error.message, 'error');
            }
        }

        // Cargar desde Supabase
        async function loadFromSupabase(email) {
            try {
                // Obtener usuario por email
                const { data: users, error: userError } = await supabaseClient
                    .from('users')
                    .select('id, salt')
                    .eq('email', email)
                    .single();

                if (userError) {
                    console.log('Usuario no encontrado en Supabase (primera vez)');
                    return null;
                }

                // Obtener contraseñas del usuario
                const { data: passwords, error: pwdError } = await supabaseClient
                    .from('passwords')
                    .select('*')
                    .eq('user_id', users.id);

                if (pwdError) {
                    console.error('Error al cargar contraseñas:', pwdError);
                    return null;
                }

                // Convertir datos de Supabase al formato local
                const convertedPasswords = passwords.map(pwd => ({
                    id: pwd.id,
                    nombre: pwd.nombre,
                    usuario: pwd.usuario,
                    contraseña: pwd.contraseña_encriptada,
                    url: pwd.url || '',
                    notas: pwd.notas || '',
                    fechaCreacion: pwd.created_at
                }));

                return {
                    salt: users.salt,
                    passwords: convertedPasswords
                };

            } catch (error) {
                console.error('Error al cargar de Supabase:', error);
                return null;
            }
        }

        // Sincronizar con Supabase
        async function syncToSupabase() {
            if (!state.isAuthenticated || !state.encryptionKey) {
                showMessage('Debe autenticar primero', 'error');
                return;
            }

            try {
                showMessage('Sincronizando con Supabase...', 'info');

                // Pedir email si no lo tiene
                const email = prompt('Ingrese su email para sincronizar:\n(necesario para acceder desde otros dispositivos)');
                if (!email) {
                    showMessage('Email requerido para sincronizar', 'error');
                    return;
                }

                // Verificar formato de email
                if (!email.includes('@')) {
                    showMessage('Email inválido', 'error');
                    return;
                }

                // Guardar o actualizar usuario en Supabase
                const { data: userData, error: userError } = await supabaseClient
                    .from('users')
                    .upsert({
                        email: email,
                        salt: arrayToHex(state.salt),
                        master_password_hash: 'encrypted_locally', // no guardamos la contraseña
                    }, { onConflict: 'email' });

                if (userError) throw new Error(`Error al guardar usuario: ${userError.message}`);

                // Obtener ID del usuario
                const { data: users, error: fetchError } = await supabaseClient
                    .from('users')
                    .select('id')
                    .eq('email', email)
                    .single();

                if (fetchError) throw new Error(`Error al obtener usuario: ${fetchError.message}`);

                const userId = users.id;

                // Guardar cada contraseña en Supabase
                for (const pwd of state.passwords) {
                    const { error: insertError } = await supabaseClient
                        .from('passwords')
                        .upsert({
                            id: pwd.id,
                            user_id: userId,
                            nombre: pwd.nombre,
                            usuario: pwd.usuario,
                            contraseña_encriptada: pwd.contraseña, // guardar en texto por ahora (debería encriptarse más)
                            url: pwd.url || null,
                            notas: pwd.notas || null,
                            created_at: pwd.fechaCreacion,
                        }, { onConflict: 'id' });

                    if (insertError) {
                        console.error('Error al guardar contraseña:', insertError);
                    }
                }

                // Guardar email en localStorage para futuras sincronizaciones
                localStorage.setItem('supabaseEmail', email);

                showMessage(`✅ Sincronizado con Supabase (${state.passwords.length} contraseñas)`, 'success');
                console.log('Sincronización completada. Email:', email);

            } catch (error) {
                showMessage('Error al sincronizar: ' + error.message, 'error');
                console.error('Error en syncToSupabase:', error);
            }
        }

        // Cerrar sesión
        async function logout() {
            if (confirm('¿Está seguro de que desea cerrar sesión?')) {
                try {
                    // Detener polling
                    if (pollInterval) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                    }

                    // Cerrar sesión en Supabase
                    await supabaseClient.auth.signOut();
                } catch (error) {
                    console.error('Error al cerrar sesión:', error);
                }

                state.isAuthenticated = false;
                state.encryptionKey = null;
                state.masterPassword = null;
                state.userId = null;
                state.userEmail = null;
                state.passwords = [];
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('appView').classList.add('hidden');
                document.getElementById('loginView').classList.remove('hidden');
                document.getElementById('loginEmail').focus();
            }
        }

        // Mostrar mensaje
        function showMessage(text, type = 'info') {
            // Determinar si estamos en login o app view
            const loginView = document.getElementById('loginView');
            const isLoginView = !loginView.classList.contains('hidden');

            const messageEl = isLoginView
                ? document.getElementById('loginMessage')
                : document.getElementById('message');

            if (messageEl) {
                messageEl.textContent = text;
                messageEl.className = `message ${type}`;

                if (type !== 'error') {
                    setTimeout(() => {
                        messageEl.textContent = '';
                        messageEl.className = '';
                    }, 3000);
                }
            }
        }

        // Actualizar estadísticas
        function updateStats() {
            document.getElementById('totalCount').textContent = state.passwords.length;
        }

        // Event listeners
        function attachEventListeners() {
            const searchInput = document.getElementById('searchInput');
            const loginPassword = document.getElementById('loginPassword');
            const loginEmail = document.getElementById('loginEmail');

            if (searchInput) {
                searchInput.addEventListener('input', () => renderPasswords());
            }

            if (loginPassword) {
                loginPassword.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') authenticate();
                });
            }

            if (loginEmail) {
                loginEmail.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') authenticate();
                });
            }
        }

        // Toggle para ver contraseña en login
        function toggleLoginPasswordVisibility() {
            const input = document.getElementById('loginPassword');
            const button = event.target;

            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = 'Ocultar';
            } else {
                input.type = 'password';
                button.textContent = 'Ver';
            }
        }

        // Funciones de seguridad
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function escapeAttr(text) {
            return text.replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // Iniciar
        init();
    </script>
